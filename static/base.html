<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{% block title %}Avatar Pipeline{% endblock %}</title>
<link rel="stylesheet" href="/static/style.css">
<script src="https://unpkg.com/htmx.org@2.0.2"></script>
<script src="https://unpkg.com/htmx-ext-sse@2.2.2"></script>
<script>htmx.config.allowScriptTags = true;</script>
</head>
<body>
<aside class="sidebar">
  <h1>Avatar Pipeline</h1>
  <nav>
    <a href="/">Dashboard</a>
  </nav>
  <div id="notif-badge" hx-ext="sse" sse-connect="/events" sse-swap="notify"></div>
</aside>
<main>{% block content %}{% endblock %}</main>
</body>
</html>
