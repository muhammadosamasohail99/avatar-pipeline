{% extends "base.html" %}
{% block content %}
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
  <h2 style="margin:0">Jobs</h2>
  <button class="secondary" onclick="window.location.reload()" style="font-size:13px;padding:6px 14px">↻ Refresh</button>
</div>
<table id="jobs">
  <thead><tr><th>Job</th><th>Visual</th><th>Status</th><th></th></tr></thead>
  <tbody hx-ext="sse" sse-connect="/events" sse-swap="jobs">
    {% for j in jobs %}
    <tr>
      <td>{{ j.title }}</td>
      <td>{{ j.visual_format }}</td>
      <td><span class="badge">{{ j.status }}</span></td>
      <td><a href="{% if j.status.startswith('gate_') %}/jobs/{{ j.job_id }}/{{ j.status.replace('_','') }}{% else %}/jobs/{{ j.job_id }}{% endif %}">Open</a></td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
